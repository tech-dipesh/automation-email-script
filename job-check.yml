name: Internship Job Alert

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # also allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache — avoids requiring package-lock.json in the repo

      - name: Install dependencies
        run: npm install

      - name: Run job checker
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
        run: node checker.js

      # Commit updated seen_jobs.json so the next run knows what was already seen
      - name: Save seen_jobs.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push